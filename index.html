<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Trainer</title>
<style>
  :root{
    --bg:#0f1714;--panel:#16211c;--panel-2:#1d2b24;--line:#28392f;
    --ink:#e8f0ec;--ink-dim:#9db0a6;--green:#3fc380;--green-deep:#1f8f5a;
    --teal:#39b9b3;--amber:#f2b441;--red:#ef6b6b;--blue:#5aa9e6;
    --radius:14px;--shadow:0 8px 30px rgba(0,0,0,.35);
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1200px 800px at 80% -10%,#16271f 0%,var(--bg) 55%) fixed;
    color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;}
  a{color:var(--teal)}
  .app{display:flex;min-height:100vh}

  .sidebar{width:310px;flex:0 0 310px;background:var(--panel);border-right:1px solid var(--line);
    padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;gap:12px;align-items:center;margin-bottom:6px}
  .brand .logo{width:42px;height:42px;border-radius:11px;flex:0 0 42px;
    background:linear-gradient(135deg,var(--green),var(--teal));display:grid;place-items:center;font-size:22px;box-shadow:var(--shadow);}
  .brand h1{font-size:15px;margin:0;line-height:1.15}
  .brand .sub{font-size:11.5px;color:var(--ink-dim)}
  .examchip{margin:14px 0 16px;padding:9px 12px;border-radius:10px;
    background:linear-gradient(135deg,rgba(63,195,128,.16),rgba(57,185,179,.10));
    border:1px solid var(--line);font-size:12px;color:var(--ink-dim)}
  .examchip b{color:var(--ink)}
  .overall{margin-bottom:14px}
  .bar-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-dim);margin-bottom:5px}
  .bar{height:8px;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--teal));width:0;transition:width .5s}
  .nav-lec{margin-bottom:4px}
  .nav-lec > .lec-btn{width:100%;text-align:left;background:transparent;border:0;color:var(--ink);
    font-weight:650;font-size:13px;padding:9px 10px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .nav-lec > .lec-btn:hover{background:var(--panel-2)}
  .lec-btn .caret{font-size:10px;color:var(--ink-dim);transition:transform .2s}
  .nav-lec.open .lec-btn .caret{transform:rotate(90deg)}
  .lec-btn .lec-pct{margin-left:auto;font-size:11px;color:var(--green);font-variant-numeric:tabular-nums}
  .topic-list{display:none;margin:2px 0 8px 8px;padding-left:10px;border-left:1px solid var(--line)}
  .nav-lec.open .topic-list{display:block}
  .topic-btn{width:100%;text-align:left;background:transparent;border:0;color:var(--ink-dim);
    font-size:12px;padding:7px 9px;border-radius:8px;cursor:pointer;display:flex;gap:7px;align-items:flex-start;line-height:1.35}
  .topic-btn:hover{background:var(--panel-2);color:var(--ink)}
  .topic-btn.active{background:rgba(63,195,128,.14);color:var(--ink);font-weight:600}
  .topic-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex:0 0 7px;margin-top:5px}
  .topic-btn .dot.done{background:var(--green)}
  .topic-btn .dot.partial{background:var(--amber)}
  .reset{margin-top:16px;width:100%;background:transparent;border:1px solid var(--line);
    color:var(--ink-dim);padding:8px;border-radius:9px;font-size:11.5px;cursor:pointer}
  .reset:hover{border-color:var(--red);color:var(--red)}

  .main{flex:1;min-width:0;padding:34px 40px 90px;max-width:1000px;margin:0 auto;width:100%}
  .crumbs{font-size:12px;color:var(--ink-dim);margin-bottom:8px;letter-spacing:.02em}
  .page-title{font-size:27px;margin:0 0 4px;line-height:1.15}
  .page-sub{color:var(--ink-dim);margin:0 0 22px;font-size:14px}

  .tabs{display:flex;gap:6px;margin:8px 0 22px;border-bottom:1px solid var(--line)}
  .tab{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--ink-dim);
    font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;margin-bottom:-1px;}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card h3{margin:0 0 12px;font-size:18px;display:flex;align-items:center;gap:9px}
  .card h3 .ix{width:26px;height:26px;border-radius:7px;background:var(--panel-2);
    display:grid;place-items:center;font-size:13px;color:var(--green);flex:0 0 26px}
  .card p{margin:0 0 11px;font-size:14.5px}
  .card ul{margin:4px 0 12px;padding-left:20px}
  .card li{margin-bottom:6px;font-size:14px}
  .card .lead{color:var(--ink);font-size:15px}
  .kw{color:var(--green);font-weight:650}
  .kw-2{color:var(--teal);font-weight:650}
  .warn{color:var(--amber);font-weight:600}

  .slidewrap{margin:0 0 16px}
  .slidewrap img{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;display:block;cursor:zoom-in}
  .slidegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 0 16px}
  .slidegrid .slidewrap{margin:0}
  .slidecap{font-size:11px;color:var(--ink-dim);margin-top:5px;font-family:var(--mono)}

  .callout{border-left:3px solid var(--teal);background:rgba(57,185,179,.08);
    padding:11px 15px;border-radius:0 10px 10px 0;margin:6px 0 12px;font-size:13.5px;}
  .callout.tip{border-left-color:var(--green);background:rgba(63,195,128,.08)}
  .callout.key{border-left-color:var(--amber);background:rgba(242,180,65,.08)}
  .callout b{color:var(--ink)}

  table.dt{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:13px}
  table.dt th,table.dt td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  table.dt th{background:var(--panel-2);color:var(--ink);font-weight:600}
  table.dt td{color:var(--ink-dim)}
  table.dt td b{color:var(--ink)}

  .formula{font-family:var(--mono);background:#0c1411;border:1px solid var(--line);
    border-radius:10px;padding:12px 15px;margin:8px 0 12px;font-size:15px;color:var(--teal);overflow-x:auto;}

  .lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:10px}
  .btn{background:linear-gradient(135deg,var(--green-deep),var(--green));border:0;color:#06140d;
    font-weight:700;font-size:13.5px;padding:11px 20px;border-radius:10px;cursor:pointer;}
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--green);color:var(--green);filter:none}
  .btn.wide{width:100%;justify-content:center;display:flex}

  .q{margin-bottom:14px}
  .q .qhead{display:flex;gap:10px;align-items:baseline;margin-bottom:11px}
  .q .qnum{font-size:11px;font-weight:700;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase}
  .qtype{font-size:10.5px;padding:2px 8px;border-radius:99px;border:1px solid var(--line);color:var(--ink-dim)}
  .qtype.mcq{color:var(--blue);border-color:rgba(90,169,230,.4)}
  .qtype.tf{color:var(--amber);border-color:rgba(242,180,65,.4)}
  .qtype.short{color:var(--teal);border-color:rgba(57,185,179,.4)}
  .q .qtext{font-size:15.5px;font-weight:600;margin-bottom:13px}
  .q .qimg{width:100%;max-width:520px;border:1px solid var(--line);border-radius:10px;background:#fff;margin:0 0 13px;display:block;cursor:zoom-in}
  .opt{display:block;width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);padding:12px 15px;border-radius:10px;margin-bottom:9px;cursor:pointer;font-size:14px;
    transition:border-color .15s,background .15s;}
  .opt:hover:not(:disabled){border-color:var(--green)}
  .opt:disabled{cursor:default}
  .opt .lab{font-weight:700;color:var(--ink-dim);margin-right:10px}
  .opt.correct{border-color:var(--green);background:rgba(63,195,128,.14)}
  .opt.correct .lab{color:var(--green)}
  .opt.wrong{border-color:var(--red);background:rgba(239,107,107,.12)}
  .opt.wrong .lab{color:var(--red)}
  .feedback{font-size:13.5px;padding:11px 14px;border-radius:10px;margin-top:4px;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:rgba(63,195,128,.1);border:1px solid rgba(63,195,128,.3)}
  .feedback.no{background:rgba(239,107,107,.1);border:1px solid rgba(239,107,107,.3)}
  .feedback b{color:var(--ink)}
  textarea.short-in{width:100%;min-height:90px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);padding:12px 14px;font-family:var(--sans);font-size:14px;resize:vertical;}
  textarea.short-in:focus{outline:none;border-color:var(--teal)}
  .model-ans{margin-top:10px;display:none}
  .model-ans.show{display:block}
  .model-ans .ma-box{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:13.5px}
  .model-ans .ma-box .mh{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:700;margin-bottom:6px}
  .self-grade{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .self-grade span{font-size:12.5px;color:var(--ink-dim)}
  .sg-btn{border:1px solid var(--line);background:transparent;color:var(--ink);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .sg-btn.got:hover,.sg-btn.got.sel{border-color:var(--green);color:var(--green);background:rgba(63,195,128,.1)}
  .sg-btn.miss:hover,.sg-btn.miss.sel{border-color:var(--red);color:var(--red);background:rgba(239,107,107,.1)}

  .quiz-result{text-align:center;padding:30px 20px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);}
  .quiz-result .score{font-size:44px;font-weight:800;line-height:1}
  .quiz-result .score.good{color:var(--green)}
  .quiz-result .score.mid{color:var(--amber)}
  .quiz-result .score.low{color:var(--red)}
  .quiz-result p{color:var(--ink-dim);margin:8px 0 18px}

  .hero{background:linear-gradient(135deg,rgba(63,195,128,.14),rgba(57,185,179,.06));
    border:1px solid var(--line);border-radius:18px;padding:30px 32px;margin-bottom:24px;}
  .hero h2{margin:0 0 8px;font-size:24px}
  .hero p{margin:0 0 4px;color:var(--ink-dim);font-size:14.5px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .lec-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;cursor:pointer;transition:border-color .15s,transform .12s;box-shadow:var(--shadow);}
  .lec-card:hover{border-color:var(--green);transform:translateY(-2px)}
  .lec-card .ic{font-size:24px;margin-bottom:8px}
  .lec-card h4{margin:0 0 4px;font-size:16px}
  .lec-card .meta{font-size:12px;color:var(--ink-dim);margin-bottom:12px}
  .lec-card .mini-bar{height:6px;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .lec-card .mini-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--teal));width:0}
  .how{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px}
  .how .step{flex:1;min-width:170px}
  .how .step .n{width:28px;height:28px;border-radius:8px;background:var(--panel-2);display:grid;place-items:center;color:var(--green);font-weight:700;margin-bottom:7px}
  .how .step b{font-size:14px}
  .how .step p{font-size:12.5px;color:var(--ink-dim);margin:3px 0 0}

  /* lightbox */
  #lightbox{display:none;position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.88);
    align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
  #lightbox.show{display:flex}
  #lightbox img{max-width:96%;max-height:94%;border-radius:8px;box-shadow:0 12px 50px rgba(0,0,0,.6)}

  .menu-toggle{display:none}
  @media(max-width:880px){
    .sidebar{position:fixed;z-index:40;transform:translateX(-100%);transition:transform .25s}
    .sidebar.open{transform:translateX(0)}
    .menu-toggle{display:grid;place-items:center;position:fixed;top:14px;left:14px;z-index:50;
      width:44px;height:44px;border-radius:11px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:20px;cursor:pointer}
    .main{padding:64px 16px 70px}
    .grid{grid-template-columns:1fr}
    .slidegrid{grid-template-columns:1fr}
  }
  .scrim{display:none}
  .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}

  .quicknav{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .qn-btn{width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-size:12.5px;font-weight:600;padding:9px 11px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:8px}
  .qn-btn:hover{border-color:var(--green);color:var(--green)}
  .qn-btn.exam{background:linear-gradient(135deg,rgba(242,180,65,.16),rgba(239,107,107,.10));border-color:rgba(242,180,65,.4)}
  .qn-btn.exam:hover{border-color:var(--amber);color:var(--amber)}
  .nav-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin:6px 0 6px 4px}

  .obj-lec{margin-bottom:22px}
  .obj-lec h3{font-size:16px;margin:0 0 10px;display:flex;align-items:center;gap:9px}
  .obj-item{display:flex;gap:11px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .obj-item:hover{border-color:var(--green)}
  .obj-item .box{width:20px;height:20px;flex:0 0 20px;border:2px solid var(--line);border-radius:6px;margin-top:1px;
    display:grid;place-items:center;font-size:13px;color:#06140d;transition:all .15s}
  .obj-item.checked .box{background:var(--green);border-color:var(--green)}
  .obj-item .otext{font-size:14px}
  .obj-item.checked .otext{color:var(--ink-dim);text-decoration:line-through}
  .obj-summary{font-size:13px;color:var(--ink-dim);margin-bottom:18px}

  .qsrc{font-size:10.5px;padding:2px 8px;border-radius:99px;border:1px solid var(--line);color:var(--ink-dim);margin-left:auto}
  .exam-setup .opt-row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 4px}
  .exam-setup .len-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    padding:10px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
  .exam-setup .len-btn:hover,.exam-setup .len-btn.sel{border-color:var(--green);color:var(--green)}

  .qn-btn.review{background:linear-gradient(135deg,rgba(90,169,230,.14),rgba(57,185,179,.08));border-color:rgba(90,169,230,.4)}
  .qn-btn.review:hover{border-color:var(--blue);color:var(--blue)}
  .wrongbadge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;min-width:19px;height:19px;
    border-radius:10px;display:inline-grid;place-items:center;padding:0 6px;font-weight:700}
  .topic-btn.lecexam-btn{color:var(--amber);font-weight:600;margin-top:4px}
  .topic-btn.lecexam-btn:hover{background:rgba(242,180,65,.1);color:var(--amber)}
  .topic-btn.lecexam-btn .dot{background:var(--amber)}

  .flash-top{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px;color:var(--ink-dim);font-size:13px}
  .flashcard{perspective:1400px;cursor:pointer;margin-bottom:18px}
  .flashcard .fc-inner{position:relative;width:100%;min-height:320px;transition:transform .55s;transform-style:preserve-3d}
  .flashcard.flipped .fc-inner{transform:rotateY(180deg)}
  .fc-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border:1px solid var(--line);
    border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 30px;box-shadow:var(--shadow)}
  .fc-front{background:linear-gradient(135deg,rgba(63,195,128,.10),var(--panel))}
  .fc-back{background:linear-gradient(135deg,rgba(57,185,179,.12),var(--panel));transform:rotateY(180deg)}
  .fc-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px}
  .fc-front .fc-label{color:var(--green)} .fc-back .fc-label{color:var(--teal)}
  .fc-text{font-size:21px;font-weight:650;line-height:1.4}
  .fc-back .fc-text{font-size:16px;font-weight:500;color:var(--ink-dim)}
  .fc-back .fc-text{color:var(--ink)}
  .fc-hint{position:absolute;bottom:14px;font-size:11px;color:var(--ink-dim)}
  .flash-nav{display:flex;gap:10px;justify-content:space-between}
</style>
</head>
<body>
<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div class="scrim" id="scrim" onclick="toggleSidebar()"></div>
<div id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img" src="" alt=""></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo" id="brandLogo">📚</div>
      <div><h1 id="brandTitle">Study Trainer</h1><div class="sub" id="brandSub"></div></div>
    </div>
    <div class="examchip" id="examChip">📅 MCQ + True/False + Short answer</div>
    <div class="overall">
      <div class="bar-label"><span>Overall mastery</span><span id="overallPct">0%</span></div>
      <div class="bar"><i id="overallBar"></i></div>
    </div>
    <div class="quicknav">
      <button class="qn-btn" onclick="goHome()">🏠 Home</button>
      <button class="qn-btn exam" onclick="goExamSetup()">🎯 Exam simulation</button>
      <button class="qn-btn" onclick="goObjectives()">✅ Objectives checklist</button>
      <button class="qn-btn review" onclick="goReview()">🔁 Wrong-answer bank <span id="wrongCount" class="wrongbadge">0</span></button>
      <button class="qn-btn" onclick="goFlashSetup()">🃏 Flashcards</button>
    </div>
    <div class="nav-h">Lectures</div>
    <nav id="nav"></nav>
    <button class="reset" onclick="resetProgress()">↺ Reset all progress</button>
  </aside>
  <main class="main" id="main"></main>
</div>

<script src="course-data.js"></script>
<script>
const COURSE = window.COURSE || [];
const FLASHCARDS = window.FLASHCARDS || {};
if(window.TEXTBOOK){COURSE.forEach(l=>{if(window.TEXTBOOK[l.id])l.topics.push(window.TEXTBOOK[l.id]);});}
if(window.OBJMASTERY){COURSE.forEach(l=>{if(window.OBJMASTERY[l.id])l.topics.push(window.OBJMASTERY[l.id]);});}
const META = window.META || {};
const COURSE_NAME = META.course || "Your Course";
const EXAM_LABEL = META.examLabel || "Exam";
const STORE_KEY = META.storeKey || ("studysite_"+(META.course||"course").toLowerCase().replace(/[^a-z0-9]+/g,"_")+"_v1");
let progress = loadProgress();
let current = {view:"home", lecId:null, topId:null, tab:"learn", lessonIdx:0};

function loadProgress(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{}}catch(e){return {}}}
function saveProgress(){localStorage.setItem(STORE_KEY,JSON.stringify(progress))}
function topicProgress(id){return progress[id]||{learned:false,quizBest:null,quizTotal:null}}
function allTopics(){const a=[];COURSE.forEach(l=>l.topics.forEach(t=>a.push({lec:l,top:t})));return a}
function topicScorePct(id){const p=topicProgress(id);if(p.quizTotal&&p.quizBest!=null)return Math.round(100*p.quizBest/p.quizTotal);return null}
function topicDotClass(id){const p=topicProgress(id);const pct=topicScorePct(id);
  if(pct!=null&&pct>=80)return "done";if(p.learned||pct!=null)return "partial";return ""}
function lecturePct(lec){let e=0,p=0;lec.topics.forEach(t=>{p+=2;const pr=topicProgress(t.id);
  if(pr.learned)e+=1;const pct=topicScorePct(t.id);if(pct!=null)e+=Math.min(1,pct/100);});return p?Math.round(100*e/p):0}
function overallPct(){let s=0,n=0;COURSE.forEach(l=>{s+=lecturePct(l);n++});return n?Math.round(s/n):0}
function slideCount(lec){return lec.topics.reduce((s,t)=>s+(t.slides?t.slides.reduce((a,sl)=>a+(sl.imgs?sl.imgs.length:0),0):0),0)}
function qCount(lec){return lec.topics.reduce((s,t)=>s+(t.quiz?t.quiz.length:0),0)}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=COURSE.map(lec=>{
    const open=current.lecId===lec.id?"open":"";
    const topics=lec.topics.map(t=>{
      const active=current.topId===t.id?"active":"";
      return `<button class="topic-btn ${active}" onclick="goTopic('${lec.id}','${t.id}')">
        <span class="dot ${topicDotClass(t.id)}"></span><span>${t.title}</span></button>`;
    }).join("")+`<button class="topic-btn lecexam-btn" onclick="startLecExam('${lec.id}')"><span class="dot"></span><span>🎓 End-of-lecture exam${lecExamBadge(lec.id)}</span></button>`;
    return `<div class="nav-lec ${open}" id="navlec-${lec.id}">
      <button class="lec-btn" onclick="toggleLec('${lec.id}')">
        <span class="caret">▶</span><span>${lec.icon} ${lec.short}</span>
        <span class="lec-pct">${lecturePct(lec)}%</span></button>
      <div class="topic-list">${topics}</div></div>`;
  }).join("");
  document.getElementById("overallPct").textContent=overallPct()+"%";
  document.getElementById("overallBar").style.width=overallPct()+"%";
  updateWrongBadge();
}
function updateWrongBadge(){const n=Object.keys(progress.__wrong||{}).length;const e=document.getElementById("wrongCount");if(e){e.textContent=n;e.style.display=n?"inline-grid":"none";}}
function toggleLec(id){document.getElementById("navlec-"+id).classList.toggle("open")}
function goHome(){current={view:"home"};renderNav();renderMain();closeSidebarMobile();window.scrollTo(0,0)}
function goTopic(lecId,topId){current={view:"topic",lecId,topId,tab:"learn",lessonIdx:0};
  const el=document.getElementById("navlec-"+lecId);if(el)el.classList.add("open");
  renderNav();renderMain();closeSidebarMobile();window.scrollTo(0,0)}
function setTab(tab){current.tab=tab;current.lessonIdx=0;renderMain();window.scrollTo(0,0)}
function currentTopic(){const lec=COURSE.find(l=>l.id===current.lecId);return lec.topics.find(t=>t.id===current.topId)}

function renderMain(){
  const m=document.getElementById("main");
  if(current.view==="home"){m.innerHTML=homeHTML();return}
  if(current.view==="objectives"){m.innerHTML=objectivesHTML();return}
  if(current.view==="examsetup"){m.innerHTML=examSetupHTML();return}
  if(current.view==="exam"){return}
  if(current.view==="review"){return}
  if(current.view==="flash"){return}
  const lec=COURSE.find(l=>l.id===current.lecId);
  const top=lec.topics.find(t=>t.id===current.topId);
  const idx=lec.topics.indexOf(top);
  m.innerHTML=`<div class="crumbs">${lec.icon} ${lec.title} &nbsp;›&nbsp; Topic ${idx+1} of ${lec.topics.length}</div>
    <h2 class="page-title">${top.title}</h2>
    <p class="page-sub">${top.sub||lec.blurb}</p>
    <div class="tabs">
      <button class="tab ${current.tab==='learn'?'active':''}" onclick="setTab('learn')">📖 Learn (${top.slides.length})</button>
      <button class="tab ${current.tab==='quiz'?'active':''}" onclick="setTab('quiz')">✏️ Test yourself (${top.quiz.length})</button>
    </div>
    <div style="margin:-6px 0 18px"><button class="btn ghost" style="padding:8px 15px;font-size:12.5px" onclick="startLecExam('${lec.id}')">🎓 Take the full end-of-lecture exam (${qCount(lec)} questions)</button></div>
    <div id="tabbody"></div>`;
  if(current.tab==="learn")renderLearn(top);else renderQuiz(top);
}

function imgHTML(src,cap){return `<div class="slidewrap"><img src="${src}" loading="lazy" onclick="zoom('${src}')"><div class="slidecap">${cap}</div></div>`}
function renderLearn(top){
  const body=document.getElementById("tabbody");
  const total=top.slides.length;
  const i=Math.min(current.lessonIdx,total-1);
  const L=top.slides[i];
  let imgs="";
  if(L.imgs&&L.imgs.length){
    if(L.imgs.length===1){imgs=imgHTML(L.imgs[0].src,L.imgs[0].cap);}
    else{imgs=`<div class="slidegrid">${L.imgs.map(im=>imgHTML(im.src,im.cap)).join("")}</div>`;}
  }
  body.innerHTML=`<div class="bar-label"><span>Lesson ${i+1} of ${total}</span><span>${Math.round(100*(i+1)/total)}%</span></div>
    <div class="bar" style="margin-bottom:16px"><i style="width:${100*(i+1)/total}%"></i></div>
    <div class="card"><h3><span class="ix">${i+1}</span>${L.h}</h3>${imgs}${L.html}</div>
    <div class="lesson-nav">
      <button class="btn ghost" onclick="prevLesson()" ${i===0?'disabled':''}>← Back</button>
      ${i<total-1?`<button class="btn" onclick="nextLesson()">Next →</button>`
        :`<button class="btn" onclick="finishLearn()">✓ Mark learned &amp; start quiz</button>`}
    </div>`;
}
function nextLesson(){current.lessonIdx++;renderLearn(currentTopic());window.scrollTo(0,0)}
function prevLesson(){current.lessonIdx--;renderLearn(currentTopic());window.scrollTo(0,0)}
function finishLearn(){const id=current.topId;progress[id]=progress[id]||{};progress[id].learned=true;saveProgress();renderNav();setTab("quiz")}

let quizState=null;
function renderQuiz(top){
  quizState={questions:top.quiz,scope:{type:"topic",topId:top.id},answers:new Array(top.quiz.length).fill(null),graded:new Array(top.quiz.length).fill(false)};
  const body=document.getElementById("tabbody");
  body.innerHTML=`<p class="page-sub" style="margin-top:-6px">${top.quiz.length} questions · multiple choice, true/false &amp; short answer. Answer them, then submit for your score.</p>
    ${top.quiz.map((q,i)=>questionHTML(q,i)).join("")}
    <button class="btn wide" id="submitBtn" onclick="submitQuiz()" style="margin-top:8px">Submit quiz &amp; see score</button>
    <div id="quizResult" style="margin-top:20px"></div>`;
}
function questionHTML(q,i){
  const tl={mcq:"Multiple choice",tf:"True / False",short:"Short answer"}[q.type];
  const img=q.img?`<img class="qimg" src="${q.img}" onclick="zoom('${q.img}')">`:"";
  let inner="";
  if(q.type==="mcq"){
    inner=q.opts.map((o,j)=>`<button class="opt" id="opt-${i}-${j}" onclick="pickMCQ(${i},${j})"><span class="lab">${String.fromCharCode(65+j)}</span>${o}</button>`).join("");
  }else if(q.type==="tf"){
    inner=`<button class="opt" id="opt-${i}-1" onclick="pickTF(${i},true)"><span class="lab">T</span>True</button>
           <button class="opt" id="opt-${i}-0" onclick="pickTF(${i},false)"><span class="lab">F</span>False</button>`;
  }else{
    inner=`<textarea class="short-in" id="short-${i}" placeholder="Write a full-sentence answer (the exam grades grammar &amp; composition)…" oninput="quizState.answers[${i}]=this.value"></textarea>
      <div class="model-ans" id="model-${i}"><div class="ma-box"><div class="mh">Model answer</div><div>${quizState.questions[i].model}</div></div>
        <div class="self-grade"><span>How did you do?</span>
          <button class="sg-btn got" id="sg-got-${i}" onclick="selfGrade(${i},true)">✓ Got it</button>
          <button class="sg-btn miss" id="sg-miss-${i}" onclick="selfGrade(${i},false)">✗ Missed it</button></div></div>`;
  }
  return `<div class="card q" id="q-${i}"><div class="qhead"><span class="qnum">Q${i+1}</span><span class="qtype ${q.type}">${tl}</span>${q._src?`<span class="qsrc">${q._src}</span>`:""}</div>
    <div class="qtext">${q.q}</div>${img}${inner}<div class="feedback" id="fb-${i}"></div></div>`;
}
function pickMCQ(i,j){if(quizState.graded[i])return;quizState.answers[i]=j;const q=quizState.questions[i];
  for(let k=0;k<q.opts.length;k++){const e=document.getElementById(`opt-${i}-${k}`);e.style.borderColor="";e.style.background="";}
  const s=document.getElementById(`opt-${i}-${j}`);s.style.borderColor="var(--teal)";s.style.background="var(--panel-2)";}
function pickTF(i,v){if(quizState.graded[i])return;quizState.answers[i]=v;
  ["1","0"].forEach(k=>{const e=document.getElementById(`opt-${i}-${k}`);e.style.borderColor="";e.style.background="";});
  const s=document.getElementById(`opt-${i}-${v?1:0}`);s.style.borderColor="var(--teal)";s.style.background="var(--panel-2)";}
function selfGrade(i,got){quizState.answers[i]=got?"__GOT__":"__MISS__";
  document.getElementById(`sg-got-${i}`).classList.toggle("sel",got);
  document.getElementById(`sg-miss-${i}`).classList.toggle("sel",!got);}
function submitQuiz(){
  let score=0; const qs=quizState.questions;
  const wrong=progress.__wrong||{};
  qs.forEach((q,i)=>{const fb=document.getElementById(`fb-${i}`);let ok=false,bank="none";
    if(q.type==="mcq"){const ans=quizState.answers[i];
      for(let k=0;k<q.opts.length;k++){const e=document.getElementById(`opt-${i}-${k}`);e.disabled=true;e.style.borderColor="";e.style.background="";
        if(k===q.a)e.classList.add("correct");else if(k===ans)e.classList.add("wrong");}
      ok=ans===q.a;bank=ok?"remove":"add";fb.className="feedback show "+(ok?"ok":"no");fb.innerHTML=(ok?"✓ <b>Correct.</b> ":"✗ <b>Not quite.</b> ")+q.exp;
    }else if(q.type==="tf"){const ans=quizState.answers[i];
      ["1","0"].forEach(k=>{const e=document.getElementById(`opt-${i}-${k}`);e.disabled=true;e.style.borderColor="";e.style.background="";});
      document.getElementById(`opt-${i}-${q.a?1:0}`).classList.add("correct");
      if(ans!==null&&ans!==q.a)document.getElementById(`opt-${i}-${ans?1:0}`).classList.add("wrong");
      ok=ans===q.a;bank=ok?"remove":"add";fb.className="feedback show "+(ok?"ok":"no");fb.innerHTML=(ok?"✓ <b>Correct.</b> ":"✗ <b>Not quite.</b> ")+q.exp;
    }else{document.getElementById(`model-${i}`).classList.add("show");const ta=document.getElementById(`short-${i}`);ta.disabled=true;
      const sg=quizState.answers[i];
      if(sg==="__GOT__"){ok=true;bank="remove";}else if(sg==="__MISS__"){bank="add";}
      fb.className="feedback show ok";fb.innerHTML="<b>Key points to hit:</b> "+q.pts.map(p=>"• "+p).join("&nbsp; ");}
    if(ok)score++;
    if(q._id){if(bank==="add")wrong[q._id]=true;else if(bank==="remove")delete wrong[q._id];}
    quizState.graded[i]=true;});
  progress.__wrong=wrong;saveProgress();updateWrongBadge();
  const total=qs.length;const pct=Math.round(100*score/total);const cls=pct>=80?"good":pct>=50?"mid":"low";
  document.getElementById("submitBtn").style.display="none";
  const res=document.getElementById("quizResult");
  if(quizState.scope.type==="topic"){
    const id=quizState.scope.topId;progress[id]=progress[id]||{};
    if(progress[id].quizBest==null||score>progress[id].quizBest)progress[id].quizBest=score;
    progress[id].quizTotal=total;progress[id].learned=true;saveProgress();renderNav();
    const msg=pct>=80?"Solid — you've got this topic.":pct>=50?"Decent — review the misses and retry.":"Keep at it — reread the slides, then retry.";
    res.innerHTML=`<div class="quiz-result"><div class="score ${cls}">${score} / ${total}</div><p>${pct}% · ${msg}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn ghost" onclick="setTab('learn')">↩ Review slides</button>
        <button class="btn" onclick="setTab('quiz')">↻ Retake quiz</button>${nextTopicBtn()}</div></div>`;
  }else if(quizState.scope.type==="exam"){
    const prev=progress.__exam||{};if(prev.bestPct==null||pct>prev.bestPct){progress.__exam={bestPct:pct};saveProgress();}
    const best=(progress.__exam&&progress.__exam.bestPct!=null)?progress.__exam.bestPct:pct;
    const msg=pct>=80?"Exam-ready — that's a strong score across all four lectures.":pct>=50?"Getting there — note which lectures the misses came from and review those topics.":"More review needed — work through the lecture topics, then retry.";
    res.innerHTML=`<div class="quiz-result"><div class="score ${cls}">${score} / ${total}</div><p>${pct}% · ${msg}</p>
      <p style="font-size:12px">Best exam score so far: ${best}%</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn" onclick="goExamSetup()">↻ New exam</button>
        <button class="btn ghost" onclick="goHome()">🏠 Home</button></div></div>`;
  }else if(quizState.scope.type==="lecexam"){
    const lid=quizState.scope.lecId;
    const store2=progress.__lecexam||{};if(store2[lid]==null||pct>store2[lid]){store2[lid]=pct;progress.__lecexam=store2;saveProgress();}
    const best=(progress.__lecexam&&progress.__lecexam[lid]!=null)?progress.__lecexam[lid]:pct;
    const msg=pct>=80?"You know this lecture cold — exam-ready.":pct>=50?"Solid — your misses are now in the wrong-answer bank; drill them and retake.":"Review this lecture's topics, then retake.";
    res.innerHTML=`<div class="quiz-result"><div class="score ${cls}">${score} / ${total}</div><p>${pct}% · ${msg}</p>
      <p style="font-size:12px">Best on this lecture exam: ${best}%</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn" onclick="startLecExam('${lid}')">↻ Retake</button>
        <button class="btn ghost" onclick="goReview()">🔁 Drill misses</button>
        <button class="btn ghost" onclick="goHome()">🏠 Home</button></div></div>`;
  }else{
    const remaining=Object.keys(progress.__wrong||{}).length;
    const cleared=total-score;
    const msg=remaining===0?"🎉 Bank cleared — you got every one right and mastered them all!":`You cleared ${score} from your bank; ${remaining} still need work. Keep drilling until it's empty.`;
    res.innerHTML=`<div class="quiz-result"><div class="score ${cls}">${score} / ${total}</div><p>${pct}% · ${msg}</p>
      <p style="font-size:12px">Questions remaining in bank: ${remaining}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        ${remaining>0?`<button class="btn" onclick="goReview()">↻ Drill remaining</button>`:""}
        <button class="btn ghost" onclick="goHome()">🏠 Home</button></div></div>`;
  }
  res.scrollIntoView({behavior:"smooth",block:"center"});
}
function nextTopicBtn(){const flat=allTopics();const idx=flat.findIndex(x=>x.top.id===current.topId);
  if(idx<flat.length-1){const nx=flat[idx+1];return `<button class="btn" onclick="goTopic('${nx.lec.id}','${nx.top.id}')">Next topic →</button>`}
  return `<button class="btn" onclick="goHome()">🏁 Finish — back home</button>`}

/* ---------- Objectives checklist ---------- */
function goObjectives(){current={view:"objectives"};renderNav();renderMain();closeSidebarMobile();window.scrollTo(0,0)}
function objectivesHTML(){
  const obj=progress.__obj||{};
  let totalDone=0,total=0;
  const blocks=COURSE.map(lec=>{
    const items=lec.objectives.map((o,i)=>{
      const key=lec.id+":"+i;const done=!!obj[key];total++;if(done)totalDone++;
      return `<div class="obj-item ${done?'checked':''}" onclick="toggleObj('${lec.id}',${i})">
        <div class="box">${done?'✓':''}</div><div class="otext">${o}</div></div>`;
    }).join("");
    return `<div class="obj-lec"><h3>${lec.icon} ${lec.title}</h3>${items}</div>`;
  }).join("");
  return `<div class="crumbs">✅ Exam objectives</div>
    <h2 class="page-title">Can you do everything on the exam?</h2>
    <p class="obj-summary">These are the professor's own study objectives from the end of each lecture — the authoritative list of what Exam 1 expects. Tick each one once you can do it confidently. <b>${totalDone} / ${total} checked.</b></p>
    ${blocks}
    <div class="callout tip">Every objective here maps to a topic in the Learn tabs. If one isn't checked, open that lecture and review the matching topic.</div>`;
}
function toggleObj(lecId,i){const obj=progress.__obj||{};const key=lecId+":"+i;obj[key]=!obj[key];progress.__obj=obj;saveProgress();renderMain()}

/* ---------- Exam simulation ---------- */
function goExamSetup(){current={view:"examsetup"};renderNav();renderMain();closeSidebarMobile();window.scrollTo(0,0)}
function examPool(){const pool=[];COURSE.forEach(l=>l.topics.forEach(t=>t.quiz.forEach(q=>{const c=Object.assign({},q);c._src=l.id;pool.push(c)})));return pool}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function examSetupHTML(){
  const poolN=examPool().length;
  const best=(progress.__exam&&progress.__exam.bestPct!=null)?progress.__exam.bestPct+"%":"—";
  return `<div class="crumbs">🎯 Exam simulation</div>
    <h2 class="page-title">Cumulative exam simulation</h2>
    <p class="page-sub">A randomized mixed test drawn from all four lectures — multiple choice, true/false, and short answer, just like Exam 1. Each question is tagged with its lecture.</p>
    <div class="card exam-setup"><h3>🎯 Build your exam</h3>
      <p>Choose how many questions (randomly selected from the full pool of ${poolN}):</p>
      <div class="opt-row">
        <button class="len-btn" onclick="startExam(15)">Quick · 15</button>
        <button class="len-btn" onclick="startExam(30)">Standard · 30</button>
        <button class="len-btn" onclick="startExam(50)">Long · 50</button>
        <button class="len-btn" onclick="startExam('all')">Everything · ${poolN}</button>
      </div>
      <p style="font-size:12px;color:var(--ink-dim);margin-top:14px">Best exam score so far: <b>${best}</b></p>
    </div>
    <div class="callout tip">Tip: take a Standard 30 a few days before the exam to find weak spots, then a full run the day before.</div>`;
}
function startExam(n){
  const pool=shuffle(examPool());
  const sel=(n==='all')?pool:pool.slice(0,Math.min(n,pool.length));
  quizState={questions:sel,scope:{type:"exam"},answers:new Array(sel.length).fill(null),graded:new Array(sel.length).fill(false)};
  current={view:"exam"};renderNav();
  const m=document.getElementById("main");
  m.innerHTML=`<div class="crumbs">🎯 Exam simulation</div>
    <h2 class="page-title">Mixed exam — ${sel.length} questions</h2>
    <p class="page-sub">Random questions from all four lectures. Answer them all, then submit for your score.</p>
    ${sel.map((q,i)=>questionHTML(q,i)).join("")}
    <button class="btn wide" id="submitBtn" onclick="submitQuiz()" style="margin-top:8px">Submit exam &amp; see score</button>
    <div id="quizResult" style="margin-top:20px"></div>`;
  closeSidebarMobile();window.scrollTo(0,0);
}

/* ---------- End-of-lecture exam ---------- */
function lecExamBadge(lecId){const s=progress.__lecexam;return (s&&s[lecId]!=null)?` · best ${s[lecId]}%`:"";}
function lecExamPool(lecId){const lec=COURSE.find(l=>l.id===lecId);const pool=[];lec.topics.forEach(t=>t.quiz.forEach(q=>{const c=Object.assign({},q);c._src=t.title;pool.push(c)}));return pool;}
function startLecExam(lecId){
  const lec=COURSE.find(l=>l.id===lecId);
  const pool=shuffle(lecExamPool(lecId));
  quizState={questions:pool,scope:{type:"lecexam",lecId},answers:new Array(pool.length).fill(null),graded:new Array(pool.length).fill(false)};
  current={view:"exam"};renderNav();
  const m=document.getElementById("main");
  m.innerHTML=`<div class="crumbs">🎓 End-of-lecture exam</div>
    <h2 class="page-title">${lec.title}</h2>
    <p class="page-sub">A comprehensive exam covering <b>everything</b> in this lecture — ${pool.length} questions, shuffled and tagged by topic. Answer them all, then submit. Anything you miss goes to your wrong-answer bank.</p>
    ${pool.map((q,i)=>questionHTML(q,i)).join("")}
    <button class="btn wide" id="submitBtn" onclick="submitQuiz()" style="margin-top:8px">Submit lecture exam &amp; see score</button>
    <div id="quizResult" style="margin-top:20px"></div>`;
  closeSidebarMobile();window.scrollTo(0,0);
}

/* ---------- Flashcards ---------- */
let flashState=null;
function allCards(){let a=[];COURSE.forEach(l=>{(FLASHCARDS[l.id]||[]).forEach(c=>a.push(c))});return a;}
function goFlashSetup(){
  current={view:"flash"};renderNav();
  const m=document.getElementById("main");
  m.innerHTML=`<div class="crumbs">🃏 Flashcards</div>
    <h2 class="page-title">Flashcards</h2>
    <p class="page-sub">Flip-card drilling of the key terms and definitions. Pick a deck — tap a card to flip it.</p>
    <div class="grid">
      ${COURSE.filter(l=>(FLASHCARDS[l.id]||[]).length).map(l=>`<div class="lec-card" onclick="startFlash('${l.id}')"><div class="ic">${l.icon}</div><h4>${l.title}</h4><div class="meta">${(FLASHCARDS[l.id]||[]).length} cards</div></div>`).join("")}
      <div class="lec-card" onclick="startFlash('all')"><div class="ic">🎴</div><h4>All lectures</h4><div class="meta">${allCards().length} cards · shuffled</div></div>
    </div>`;
  closeSidebarMobile();window.scrollTo(0,0);
}
function startFlash(deck){
  const cards=(deck==='all')?allCards().slice():(FLASHCARDS[deck]||[]).slice();
  flashState={cards:shuffle(cards),idx:0,flipped:false,deck};
  current={view:"flash"};renderNav();renderFlashCard();closeSidebarMobile();window.scrollTo(0,0);
}
function renderFlashCard(){
  const s=flashState;const c=s.cards[s.idx];const m=document.getElementById("main");
  m.innerHTML=`<div class="crumbs">🃏 Flashcards · ${s.deck==='all'?'All lectures':s.deck}</div>
    <div class="flash-top"><span>Card ${s.idx+1} / ${s.cards.length}</span>
      <button class="btn ghost" style="padding:7px 13px;font-size:12px" onclick="goFlashSetup()">← Decks</button></div>
    <div class="flashcard ${s.flipped?'flipped':''}" onclick="flipCard()">
      <div class="fc-inner">
        <div class="fc-face fc-front"><div class="fc-label">Term</div><div class="fc-text">${c.f}</div><div class="fc-hint">tap to flip</div></div>
        <div class="fc-face fc-back"><div class="fc-label">Definition</div><div class="fc-text">${c.b}</div></div>
      </div></div>
    <div class="flash-nav">
      <button class="btn ghost" onclick="flashPrev()" ${s.idx===0?'disabled':''}>← Prev</button>
      <button class="btn ghost" onclick="flashShuffle()">🔀 Shuffle</button>
      <button class="btn" onclick="flashNext()" ${s.idx===s.cards.length-1?'disabled':''}>Next →</button>
    </div>`;
}
function flipCard(){flashState.flipped=!flashState.flipped;renderFlashCard();}
function flashNext(){if(flashState.idx<flashState.cards.length-1){flashState.idx++;flashState.flipped=false;renderFlashCard();}}
function flashPrev(){if(flashState.idx>0){flashState.idx--;flashState.flipped=false;renderFlashCard();}}
function flashShuffle(){flashState.cards=shuffle(flashState.cards);flashState.idx=0;flashState.flipped=false;renderFlashCard();}

/* ---------- Wrong-answer bank ---------- */
function goReview(){
  current={view:"review"};renderNav();
  const ids=Object.keys(progress.__wrong||{});
  const qs=shuffle(ids.map(id=>QINDEX[id]).filter(Boolean));
  const m=document.getElementById("main");
  if(!qs.length){
    m.innerHTML=`<div class="crumbs">🔁 Wrong-answer bank</div>
      <h2 class="page-title">Your wrong-answer bank is empty 🎉</h2>
      <p class="page-sub">Any question you miss in a topic quiz or an exam simulation lands here automatically. Re-do it here and get it right, and it clears out — so the bank is your personalized "still need to master" list.</p>
      <div class="callout tip">Go take a topic quiz or an exam simulation. Anything you get wrong (or mark "missed it" on a short answer) will show up here for focused review.</div>`;
    closeSidebarMobile();window.scrollTo(0,0);return;
  }
  quizState={questions:qs,scope:{type:"review"},answers:new Array(qs.length).fill(null),graded:new Array(qs.length).fill(false)};
  m.innerHTML=`<div class="crumbs">🔁 Wrong-answer bank</div>
    <h2 class="page-title">Drill your misses — ${qs.length} question${qs.length>1?'s':''}</h2>
    <p class="page-sub">These are questions you've gotten wrong before, pulled from across all lectures (tagged by source). Get one right here and it leaves the bank. Miss it and it stays for next time.</p>
    ${qs.map((q,i)=>questionHTML(q,i)).join("")}
    <button class="btn wide" id="submitBtn" onclick="submitQuiz()" style="margin-top:8px">Submit &amp; update bank</button>
    <div id="quizResult" style="margin-top:20px"></div>`;
  closeSidebarMobile();window.scrollTo(0,0);
}

function homeHTML(){
  const cards=COURSE.map(lec=>{const pct=lecturePct(lec);
    return `<div class="lec-card" onclick="goTopic('${lec.id}','${lec.topics[0].id}')">
      <div class="ic">${lec.icon}</div><h4>${lec.title}</h4>
      <div class="meta">${lec.topics.length} topics · ${slideCount(lec)} slides · ${qCount(lec)} questions</div>
      <div class="mini-bar"><i style="width:${pct}%"></i></div>
      <div style="font-size:11px;color:var(--ink-dim);margin-top:6px">${pct}% mastered</div></div>`}).join("");
  const totSlides=COURSE.reduce((s,l)=>s+slideCount(l),0);
  const totQ=COURSE.reduce((s,l)=>s+qCount(l),0);
  const examWhen=META.examDate?` is <b>${META.examDate}</b>`:"";
  return `<div class="hero"><h2>${META.logo||"📚"} Your ${EXAM_LABEL} trainer — every slide, taught & quizzed</h2>
    <p>All ${totSlides} lecture slides, each shown and explained, with ${totQ} practice questions.</p>
    <p style="margin-top:8px;font-size:13px">${EXAM_LABEL}${examWhen}: multiple choice, true/false, and short answer. This site drills all three.</p>
    <div class="how">
      <div class="step"><div class="n">1</div><b>See the slide</b><p>Every real lecture slide is embedded — click any image to zoom.</p></div>
      <div class="step"><div class="n">2</div><b>Learn it</b><p>Detailed teaching beneath each slide explains what to know.</p></div>
      <div class="step"><div class="n">3</div><b>Test it</b><p>MCQ, true/false &amp; short-answer with instant feedback &amp; saved scores.</p></div>
    </div></div>
    <h3 style="margin:0 0 14px;font-size:17px">Pick a lecture to begin</h3>
    <div class="grid">${cards}</div>
    <h3 style="margin:24px 0 14px;font-size:17px">Then prove you know it</h3>
    <div class="grid">
      <div class="lec-card" onclick="goExamSetup()"><div class="ic">🎯</div><h4>Exam simulation</h4><div class="meta">Randomized mixed test from all 4 lectures — MCQ, true/false &amp; short answer</div></div>
      <div class="lec-card" onclick="goObjectives()"><div class="ic">✅</div><h4>Objectives checklist</h4><div class="meta">Tick off every skill the objectives require</div></div>
      <div class="lec-card" onclick="goReview()"><div class="ic">🔁</div><h4>Wrong-answer bank</h4><div class="meta">Re-drill every question you've missed until you've mastered it</div></div>
      <div class="lec-card" onclick="goFlashSetup()"><div class="ic">🃏</div><h4>Flashcards</h4><div class="meta">Rapid flip-card drilling of every key term and definition</div></div>
    </div>
    ${META.tip?`<div class="callout tip" style="margin-top:22px">${META.tip}</div>`:""}`;
}
function resetProgress(){if(confirm("Reset all progress and scores? This can't be undone.")){progress={};saveProgress();renderNav();
  if(current.view==="topic")setTab(current.tab);else renderMain();}}
function zoom(src){document.getElementById("lightbox-img").src=src;document.getElementById("lightbox").classList.add("show")}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("scrim").classList.toggle("show")}
function closeSidebarMobile(){if(window.innerWidth<=880){document.getElementById("sidebar").classList.remove("open");document.getElementById("scrim").classList.remove("show")}}

const QINDEX={};
COURSE.forEach(l=>l.topics.forEach(t=>t.quiz.forEach((q,i)=>{q._id=l.id+"."+t.id+"."+i;q._lec=l.id;q._top=t.id;q._topTitle=t.title;QINDEX[q._id]=q;})));
function applyBranding(){
  document.title=COURSE_NAME+" | "+EXAM_LABEL+" Trainer";
  const setT=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  setT("brandLogo",META.logo||"📚");
  setT("brandTitle",META.brandTitle||COURSE_NAME);
  setT("brandSub",(META.courseCode?META.courseCode+" · ":"")+EXAM_LABEL);
  const chip=document.getElementById("examChip");
  if(chip)chip.innerHTML="📅 <b>"+EXAM_LABEL+(META.examDate?": "+META.examDate:"")+"</b> · MCQ + True/False + Short answer";
}
applyBranding();
if(!COURSE.length){document.getElementById("main").innerHTML='<div class="card"><h3>⚠️ Content file not found</h3><p>Make sure <b>course-data.js</b> is in the same folder as this HTML file.</p></div>';}
else{renderNav();renderMain();}
</script>
</body>
</html>
